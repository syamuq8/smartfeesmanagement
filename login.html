<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Fee Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  body { background: linear-gradient(135deg, #1a3c6e 0%, #2a52a0 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { background: #fff; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
  .login-card .logo { width: 56px; height: 56px; background: #1a3c6e; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
  .form-control:focus { border-color: #1a3c6e; box-shadow: 0 0 0 3px rgba(26,60,110,.1); }
  .btn-login { background: #1a3c6e; border: none; padding: .65rem; font-weight: 600; letter-spacing: .02em; }
  .btn-login:hover { background: #2a52a0; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <i class="bi bi-mortarboard-fill text-white fs-4"></i>
  </div>
  <h5 class="text-center fw-bold mb-1">Fee Management Portal</h5>
  <p class="text-center text-muted small mb-4">{{ config.COLLEGE_NAME }}</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-semibold small">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold small">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-login w-100 text-white">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
    </button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
